setw -g mode-keys vi

set -g set-titles on
set -g set-titles-string 'tmux: #W'
set -s set-clipboard external
set -g allow-passthrough on

# Enable OSC 52 clipboard capability
set -as terminal-features ',xterm-256color:clipboard'
set -as terminal-features ',wezterm:clipboard'
set -as terminal-features ',wezterm-256color:clipboard'

# vi mode copying
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send -X copy-selection-and-cancel

# split window
bind | split-window -h
bind - split-window -v

# fast moving pane
bind -n M-C-h select-pane -L
bind -n M-C-j select-pane -D
bind -n M-C-k select-pane -U
bind -n M-C-l select-pane -R

# enable mouse
set -g mouse on
